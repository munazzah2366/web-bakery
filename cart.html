<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fresh Bread</title>
    <link rel="stylesheet" href="cart.css">
</head>
<body>

<header>
    <nav>
       <div class="logo"><img src="logo.png" alt="Fresh Bread Logo"></div>

         <ul>
           <li><a href="base.html">HOME</a></li>
           <li><a href="our-story.html">OUR STORY</a></li>
           <li><a href="baked-goods.html">BAKED GOODS</a></li>
           <li><a href="cupcakes.html">CUPCAKES</a></li>
           <li><a href="chocolates.html">CHOCOLATES</a></li>
           <li><a href="pastries.html">PASTRIES</a></li>
        </ul>

        <div class="icons">
         🔍 <a href="cart.html">🛒 <span id="cart-count">0</span></a>
        </div>
    </nav>
</header>

<div class="page-content">

    <h1>Your Cart 🛒</h1>

    <div id="cart-items"></div>

    <div class="cart-footer">
        <h2 id="total"></h2>

        <div class="footer-actions">
            <button class="clear-cart" onclick="clearCart()">Clear Cart</button>
            <button class="checkout" onclick="checkout()">Check Out</button>
        </div>
    </div>

</div>


<script>
function checkout() {
    window.location.href = "checkout.html";
    // make sure cart exists in localStorage
    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    if (cart.length === 0) {
        alert("Your cart is empty!");
        return;
    }

    // optional: ensure data is saved before redirect
    localStorage.setItem("cart", JSON.stringify(cart));

   
}
</script>




<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

const container = document.getElementById("cart-items");
const totalDisplay = document.getElementById("total");

function displayCart() {
    container.innerHTML = "";  // Clear previous cart items
    let total = 0;

    cart.forEach((item, index) => {
        total += item.price;

        // Display image, name, price, and remove button
        container.innerHTML += `
            <div style="display:flex; align-items:center; gap:20px; margin-bottom:20px; background:#f5f5f5; padding:10px; border-radius:10px;">
                <img src="${item.image}" style="width:80px; height:80px; object-fit:cover; border-radius:8px;">
                <div>
                    <p><strong>${item.name}</strong></p>
                    <p>Dhs. ${item.price}</p>
                    <button onclick="removeItem(${index})">Remove</button>
                </div>
            </div>
        `;
    });

    totalDisplay.textContent = "Total: Dhs. " + total;
}

function removeItem(index) {
    cart.splice(index, 1);  // Remove item at the specified index
    localStorage.setItem("cart", JSON.stringify(cart));  // Update cart in localStorage
    displayCart();  // Re-render the cart after removal
}

function clearCart() {
    localStorage.removeItem("cart");
    cart = [];
    displayCart();
}

displayCart();
</script>

</footer>

<script src="cart.js"></script>

</body>
</html>
